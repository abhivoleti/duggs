const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-73.5673, 45.5017],
  zoom: 15,
  pitch: 60,

map.on('load', () => {
  map.addControl(
  new mapboxgl.GeolocateControl({
    positionOptions: {
      enableHighAccuracy: true
    },
    trackUserLocation: true,
    showUserHeading: true
  })
);

  // 3D BUILDINGS
  map.addLayer({
    id: '3d-buildings',
    source: 'composite',
    'source-layer': 'building',
    filter: ['==', 'extrude', 'true'],
    type: 'fill-extrusion',
    minzoom: 14,
    paint: {
      'fill-extrusion-color': '#111',
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base': ['get', 'min_height'],
      'fill-extrusion-opacity': 0.6
    }
  });

  addThreeLayer();
});

let cube, merc;

function addThreeLayer() {

  const layer = {
    id: 'three-layer',
    type: 'custom',
    renderingMode: '3d',

    onAdd: function (map, gl) {
      this.camera = new THREE.Camera();
      this.scene = new THREE.Scene();

      this.renderer = new THREE.WebGLRenderer({
        canvas: map.getCanvas(),
        context: gl
      });

      this.renderer.autoClear = false;

      // light
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(0, -70, 100);
      this.scene.add(light);

      // START POSITION
      merc = mapboxgl.MercatorCoordinate.fromLngLat(
        [-73.5673, 45.5017],
        0
      );

      const geo = new THREE.BoxGeometry(0.0005, 0.0005, 0.0005);
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });

      // cube = new THREE.Mesh(geo, mat);
      // cube.position.set(merc.x, merc.y, merc.z);
      // cube.scale.set(0.8, 0.8, 0.8);

      this.scene.add(cube);

      // interaction
      this.raycaster = new THREE.Raycaster();
      this.mouse = new THREE.Vector2();
      this.hovered = false;

      window.addEventListener('mousemove', (e) => {
        this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      });
    },

    render: function (gl, matrix) {

      this.camera.projectionMatrix = new THREE.Matrix4().fromArray(matrix);

      // hover detection
      this.raycaster.setFromCamera(this.mouse, this.camera);
      const hits = this.raycaster.intersectObject(cube);

      if (hits.length > 0 && !this.hovered) {
        this.hovered = true;

        gsap.to(cube.position, {
          z: merc.z + 0.0005,
          duration: 0.6
        });

        gsap.to(cube.scale, {
          x: 1.3, y: 1.3, z: 1.3
        });

      } else if (hits.length === 0 && this.hovered) {
        this.hovered = false;

        gsap.to(cube.position, {
          z: merc.z,
          duration: 0.5
        });

        gsap.to(cube.scale, {
          x: 0.8, y: 0.8, z: 0.8
        });
      }

      this.renderer.resetState();
      this.renderer.render(this.scene, this.camera);
      map.triggerRepaint();
    }
  };

  map.addLayer(layer);
}

const coordinatesGeocoder = function (query) {
  const matches = query.match(
    /^[ ]*(?:Lat: )?(-?\d+\.?\d*)[, ]+(?:Lng: )?(-?\d+\.?\d*)[ ]*$/i
  );
  if (!matches) return null;

  function coordinateFeature(lng, lat) {
    return {
      center: [lng, lat],
      geometry: {
        type: 'Point',
        coordinates: [lng, lat]
      },
      place_name: 'Lat: ' + lat + ' Lng: ' + lng,
      place_type: ['coordinate'],
      type: 'Feature'
    };
  }

  const coord1 = Number(matches[1]);
  const coord2 = Number(matches[2]);
  const geocodes = [];

  if (coord1 < -90 || coord1 > 90) {
    geocodes.push(coordinateFeature(coord1, coord2));
  }

  if (coord2 < -90 || coord2 > 90) {
    geocodes.push(coordinateFeature(coord2, coord1));
  }

  if (geocodes.length === 0) {
    geocodes.push(coordinateFeature(coord1, coord2));
    geocodes.push(coordinateFeature(coord2, coord1));
  }

  return geocodes;
};

const geocoder = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  localGeocoder: coordinatesGeocoder,
  mapboxgl: mapboxgl,
  zoom: 16,
  placeholder: 'Search or type: lng, lat',
  reverseGeocode: true
});

map.addControl(geocoder);

geocoder.on('result', (e) => {
  const coords = e.result.center;

  // move map (optional but smooth)
  map.flyTo({
    center: coords,
    zoom: 16,
    pitch: 60
  });

  // move your 3D object
  merc = mapboxgl.MercatorCoordinate.fromLngLat(coords, 0);
  cube.position.set(merc.x, merc.y, merc.z);
});
